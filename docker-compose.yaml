      DB_SERVER: host.docker.internal
      DB_PORT: 1433
      DB_DATABASE: PROYECTO
      DB_USER: admin
      DB_PASSWORD: root
      SERVER_PORT: 3000
      JWT_SECRET: 47e65c0b9d220ea2083755a9800fa3936295c10ca014df9a2967fb16808669290ba54cafa18f776f0059f3a578e80b7ffd4cd416bb9f2a764e03692541b52b32

  frontend:
